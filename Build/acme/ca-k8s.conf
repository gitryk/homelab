[req]
req_extensions=inter_k8s
distinguished_name=req_distinguished_name
prompt=no

[req_distinguished_name]
C=KR
ST=Incheon
L=Bupyeong-gu
O=TryK-Lab
CN=TryK-Lab Intermediate CA for k8s
OU=TryK-Lab Certification

[inter_ca]
subjectKeyIdentifier=hash
authorityKeyIdentifier=keyid:always,issuer
basicConstraints=critical,CA:true,pathlen:0
keyUsage=critical,keyCertSign,cRLSign
nameConstraints=@name_constraints

[name_constraints]
permitted;DNS.0=.cluster.local
permitted;DNS.1=.svc.cluster.local
permitted;IP.0=10.96.0.0/255.240.0.0
permitted;IP.1=10.244.0.0/255.255.0.0
permitted;IP.2=172.16.20.0/255.255.255.192
